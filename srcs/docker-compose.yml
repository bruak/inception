secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  credentials:
    file: ../secrets/credentials.txt

networks:
  inception-network:
    name: inception-network
    driver: bridge

volumes:
  mariadb_data:
    driver: local
    name: wp
    driver_opts:
      type: none
      o: bind
      device: $HOME/data/mariadb

  wordpress_data:
    driver: local
    name: wp
    driver_opts:
      type: none
      o: bind
      device: $HOME/data/wordpress

services:

  mariadb:
    container_name: mariadb
    build: ./requirements/mariadb
    env_file:
      - .env
    expose:
      - "3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception-network
    secrets:
      - db_password
      - db_root_password
      - credentials
    restart: on-failure

  nginx:
    container_name: nginx
    build: ./requirements/nginx
    ports:
      - "443:443"
    volumes:
      - wordpress_data:/var/www/html
    networks:
        - inception-network
    secrets:
      - credentials
    

