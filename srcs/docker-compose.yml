services:
  nginx:
    container_name: Test-nginx-1
    build: ./requirements/nginx
    ports:
      - "8080:80"
    volumes:
      - ./requirements/nginx/tools/html:/usr/share/nginx/html
      - ./requirements/nginx/conf/nginx.conf:/etc/nginx/nginx.conf

  mariadb:
    container_name: Test-mariadb-1
    build: ./requirements/mariadb
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: test
      MYSQL_USER: test
      MYSQL_PASSWORD: test
    ports:
      - "3306:3306"
    volumes:
      - ./requirements/mariadb/conf/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./requirements/mariadb/tools:/var/lib/mysql

